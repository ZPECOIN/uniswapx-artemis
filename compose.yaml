# UniswapX Artemis Docker Compose Configuration
# Production-ready configuration with environment variable support

services:
  artemis:
    build:
      context: .
      target: final
    container_name: uniswapx-artemis
    restart: unless-stopped
    
    # Environment variables - load from .env file
    env_file:
      - .env
    
    # Additional environment variables
    environment:
      - RUST_LOG=${LOG_LEVEL:-info}
      - RUST_BACKTRACE=1
    
    # Health check
    healthcheck:
      test: ["CMD", "pgrep", "server"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    
    # Security options
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    
    # Volume for persistent data (if needed)
    volumes:
      - artemis-data:/app/data
    
    # Network configuration
    networks:
      - artemis-network

# Named volumes
volumes:
  artemis-data:
    driver: local

# Networks
networks:
  artemis-network:
    driver: bridge

